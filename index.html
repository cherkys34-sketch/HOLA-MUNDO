<!DOCTYPE html>
<html>
<head>
    <title>Sobre Mi-Silvina Carnero/title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background:linear-gradient(135deg, #0a192f 0%, #112240 100%);
            color: #ccd6f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            padding: 40px;
            border: 2px solid #64ffda;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(100, 255, 218, 0.3);
        }

        .foto {
           object-fit:cover; width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #64ffda;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            color: #64ffda;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            color: #8892b0;
        }

        .badge {
            display: inline-block;
            background: #64ffda;
            color: #0a192f;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration:none;
            font-weight:bold;
            margin-top:15px;
            
        }
            a:hover {
                background #fff;
        }
    </style>
</head>
<body>
     <div class="container">
        <img src="foto.jpg" alt="cherkys34" class="foto">
        <h1>Hola, soy Silvina Carnero</h1>
        <p>Programo desde Córdoba Argentina</p>
        <div class="badge">Mi primer sitio web</div>
        <a href="sobremi.html">Conoceme más</a> 
    </div>
</body>
</html>
